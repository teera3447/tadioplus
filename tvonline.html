<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Tadio+ ดูทีวีออนไลน์</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">

    <style>
        :root { --bg: #f8f9fa; --panel: #ffffff; --accent: #ff4757; --text: #333; --border: #eee; }
        body.dark { --bg: #121212; --panel: #1e1e1e; --text: #eee; --border: #333; }
        
        * { box-sizing: border-box; transition: 0.3s; }
        body { margin: 0; font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 0 20px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); height: 60px; flex-shrink: 0; }
        .logo { font-weight: 600; font-size: 20px; color: var(--accent); }

        #app { display: flex; flex: 1; overflow: hidden; }

        /* Player Section */
        #playerWrap { flex: 1; background: #000; display: flex; flex-direction: column; position: relative; }
        .video-js { width: 100% !important; height: 100% !important; }

        /* Status Bar ใต้เครื่องเล่น */
        .status-bar { padding: 12px 20px; background: var(--panel); font-size: 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; color: var(--text); font-weight: 400; }

        /* Sidebar Section */
        #channels { width: 350px; background: var(--panel); display: flex; flex-direction: column; border-left: 1px solid var(--border); }
        .search-box { padding: 15px; border-bottom: 1px solid var(--border); }
        input { width: 100%; padding: 10px 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }

        #list { flex: 1; overflow-y: auto; padding: 10px; }
        .channel { padding: 10px; margin-bottom: 5px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; border: 1px solid transparent; }
        .channel:hover { background: #fff1f2; }
        .channel.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .channel img { width: 40px; height: 40px; object-fit: contain; background: #fff; border-radius: 8px; padding: 2px; }

        /* Mobile Responsive */
        @media(max-width: 850px) { 
            body { overflow-y: auto; height: auto; }
            #app { flex-direction: column; }
            #playerWrap { height: 56.25vw; min-height: 230px; flex: none; position: sticky; top: 0; z-index: 100; }
            #channels { width: 100%; border: none; height: auto; min-height: 500px; }
        }
    </style>
</head>
<body>

<header>
    <a href="https://teera3447.github.io/tadioplus/" style="text-decoration:none; color:var(--text); font-size:14px;">← หน้าหลัก</a>
    <div class="logo">Tadio+ TV</div>
    <button onclick="document.body.classList.toggle('dark')" style="cursor:pointer; border:1px solid var(--border); background:var(--panel); color:var(--text); border-radius:15px; padding:4px 12px;">🌗 ธีม</button>
</header>

<div id="app">
    <div id="playerWrap">
        <video id="my-video" class="video-js vjs-theme-fantasy" controls preload="auto" playsinline></video>
        <div class="status-bar" id="status">⏳ กำลังเตรียมความพร้อม...</div>
    </div>
    
    <div id="channels">
        <div class="search-box">
            <input type="text" id="search" placeholder="🔍 ค้นหาชื่อช่องรายการ..." oninput="filter()">
        </div>
        <div id="list"></div>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://unpkg.com/videojs-contrib-quality-levels@4.1.0/dist/videojs-contrib-quality-levels.min.js"></script>
<script src="https://unpkg.com/videojs-hls-quality-selector@2.0.0/dist/videojs-hls-quality-selector.min.js"></script>

<script>
    const BASE_WORKER_URL = "https://iptv.tadioplus.workers.dev"; 
    let allChannels = [];
    
    // ตั้งค่า Player พร้อมปุ่มปรับคุณภาพ
    const player = videojs('my-video', {
        fluid: true,
        autoplay: false,
        playbackRates: [0.5, 1, 1.5, 2],
        controlBar: {
            children: [
                'playToggle',
                'volumePanel',
                'qualitySelector', // ปุ่มปรับความละเอียด
                'liveDisplay',
                'fullscreenToggle',
            ],
        }
    });

    // เปิดใช้งาน Plugin ปรับคุณภาพ
    player.hlsQualitySelector({ displayCurrentQuality: true });

    async function loadM3U() {
        try {
            document.getElementById('status').innerText = "⏳ กำลังดึงข้อมูล...";
            const res = await fetch(`${BASE_WORKER_URL}/list`);
            const data = await res.text();
            parseM3U(data);
        } catch (e) {
            document.getElementById('status').innerText = "❌ ไม่สามารถดึงรายการได้";
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        allChannels = [];
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].startsWith('#EXTINF:')) {
                const name = lines[i].split(',')[1] || "Unknown";
                const logoMatch = lines[i].match(/tvg-logo="([^"]+)"/);
                const url = lines[i+1]?.trim();
                if (url && url.startsWith('http')) {
                    allChannels.push({ name, url, logo: logoMatch ? logoMatch[1] : "" });
                }
            }
        }
        render(allChannels);
        document.getElementById('status').innerText = `🟢 พร้อมรับชม ${allChannels.length} ช่อง`;
    }

    function render(data) {
        const list = document.getElementById('list');
        list.innerHTML = "";
        data.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'channel';
            div.innerHTML = `<img src="${ch.logo || ''}" onerror="this.src='https://via.placeholder.com/40?text=TV'"> <span>${ch.name}</span>`;
            div.onclick = () => play(ch, div);
            list.appendChild(div);
        });
    }

    function play(ch, el) {
        let playUrl = ch.url;

        // แยกแยะ: ครอบ Proxy เฉพาะ http เท่านั้น
        if (ch.url.startsWith('http://')) {
            playUrl = `${BASE_WORKER_URL}/?url=` + encodeURIComponent(ch.url);
        }
        
        document.querySelectorAll('.channel').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('status').innerHTML = `📡 เชื่อมต่อ: <b>${ch.name}</b>`;
        
        player.src({ src: playUrl, type: 'application/x-mpegURL' });
        player.play().catch(e => console.log("Playback blocked"));
        
        if(window.innerWidth < 850) window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filter() {
        const txt = document.getElementById('search').value.toLowerCase();
        render(allChannels.filter(c => c.name.toLowerCase().includes(txt)));
    }

    loadM3U();
</script>
</body>
</html>
